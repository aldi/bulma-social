name: Publish to npm

on:
  release:
    types: [published]

permissions: {}

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node -e 'const pkg = require("./package.json"); if (process.env.RELEASE_TAG !== pkg.version) { throw new Error(`Release tag ${process.env.RELEASE_TAG} does not match package version ${pkg.version}`); }'

      - name: Verify and build
        run: npm run check

      - name: Verify committed package artifacts
        run: |
          git diff --check
          git diff --exit-code -- css docs/public/all.min.css
          test -z "$(git status --porcelain --untracked-files=all -- css docs/public/all.min.css)"
          npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
